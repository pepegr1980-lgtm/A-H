<!DOCTYPE html> 
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monitor PRO NIVEL DIOS</title>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<style>
body { font-family: Arial; background:#f2f2f2; margin:0; padding:10px; }

h1 { text-align:center; font-size:20px; }

.card {
  background:white;
  border-radius:12px;
  padding:12px;
  margin-bottom:12px;
  box-shadow:0 2px 6px rgba(0,0,0,0.15);
  animation: aparecer 0.3s ease;
}

@keyframes aparecer {
  from { transform:scale(0.95); opacity:0; }
  to { transform:scale(1); opacity:1; }
}

.nuevo { border-left:6px solid red; }
.medio { border-left:6px solid orange; }
.viejo { border-left:6px solid green; }

button {
  padding:10px;
  border:none;
  border-radius:8px;
  margin-top:5px;
  width:100%;
  font-size:14px;
}

.entregarBtn { background:green; color:white; }
.eliminarBtn { background:red; color:white; }
.rutaBtn { background:#2196F3; color:white; }
.estadoBtn { background:#FF9800; color:white; }
.printBtn { background:#9C27B0; color:white; }
</style>
</head>

<body>

<h1>🚀 Monitor Nivel Dios</h1>

<div id="contenedor"></div>

<audio id="sonido">
  <source src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg">
</audio>

<script>
const firebaseConfig = {
 apiKey: "AIzaSyC4FVokHFRbbTc4rBifNyt5bvOX2CuzkWw",
 authDomain: "calificaciones-9f753.firebaseapp.com",
 projectId: "calificaciones-9f753"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const contenedor = document.getElementById('contenedor');
const sonido = document.getElementById('sonido');

let ventasCache = [];
let idsMostrados = new Set();

function tiempoColor(fecha){
  const minutos = (new Date() - fecha) / 60000;
  if(minutos < 5) return "nuevo";
  if(minutos < 15) return "medio";
  return "viejo";
}

function render(){
  contenedor.innerHTML='';

  ventasCache.forEach(v=>{
    const d = v.data;
    if(d.entregado) return;

    let fecha = d.fecha_venta?.toDate
      ? d.fecha_venta.toDate()
      : new Date(d.fecha_venta);

    const clase = tiempoColor(fecha);

    const direccion = (d.direccion||'') + (d.numero ? ' #' + d.numero : '');
    const total = d.total || (d.precio * (d.cantidad_vendida||1));

    const productos = d.productos
      ? d.productos.map(p=>`${p.producto} x${p.cantidad}`).join('<br>')
      : `${d.producto} x${d.cantidad_vendida || 1}`;

    contenedor.innerHTML += `
    <div class="card ${clase}">
      <b>${d.familia || ''}</b><br>
      📍 ${direccion}<br>
      📞 ${d.telefono}<br>
      🕒 ${fecha.toLocaleTimeString()}<br>

      <div>${productos}</div>

      <b>Total: $${total}</b><br>
      <small>${d.estado || 'Pendiente'}</small>

      <button class="rutaBtn" onclick="abrirMapa('${direccion}')">📍 Ruta</button>
      <button class="estadoBtn" onclick="cambiarEstado('${v.id}','${d.estado||'Pendiente'}')">🚚 Cambiar estado</button>
      <button class="printBtn" onclick="imprimir('${direccion}','${productos}',${total})">🧾 Ticket</button>
      <button class="entregarBtn" onclick="entregar('${v.id}')">✅ Entregar</button>
      <button class="eliminarBtn" onclick="eliminar('${v.id}')">❌ Eliminar</button>
    </div>`;
  });
}

function abrirMapa(dir){
  window.open(`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(dir)}`);
}

function imprimir(dir, productos, total){
  const win = window.open('', '', 'width=300,height=600');
  win.document.write(`
    <h3>Pedido</h3>
    <p>${dir}</p>
    <p>${productos}</p>
    <h2>Total: $${total}</h2>
    <script>window.print();<\/script>
  `);
}

async function eliminar(id){
  await db.collection('ventas').doc(id).delete();
}

async function entregar(id){
  await db.collection('ventas').doc(id).update({entregado:true});
}

async function cambiarEstado(id, estado){
  let nuevo = "Pendiente";
  if(estado === "Pendiente") nuevo = "En camino";
  else if(estado === "En camino") nuevo = "Entregado";

  await db.collection('ventas').doc(id).update({estado:nuevo});
}

db.collection('ventas').orderBy('fecha_venta','desc')
.onSnapshot(snap=>{
  const nuevosIds = snap.docs.map(d=>d.id);

  nuevosIds.forEach(id=>{
    if(!idsMostrados.has(id)){
      sonido.play();
    }
  });

  idsMostrados = new Set(nuevosIds);

  ventasCache = snap.docs.map(doc=>({id:doc.id,data:doc.data()}));
  render();
});
</script>

</body>
</html>
