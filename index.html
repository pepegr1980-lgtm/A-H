<!DOCTYPE html> 
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>   Empresa Pro </title>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<style>
body { font-family: Arial; background:#f2f2f2; margin:0; padding:10px; }
h1 { text-align:center; }

.card {
  background:white;
  border-radius:12px;
  padding:12px;
  margin-bottom:12px;
  box-shadow:0 2px 6px rgba(0,0,0,0.15);
}

.nuevo { border-left:6px solid red; }
.medio { border-left:6px solid orange; }
.viejo { border-left:6px solid green; }

button {
  width:100%;
  padding:10px;
  margin-top:5px;
  border:none;
  border-radius:8px;
}

.entregarBtn { background:green; color:white; }
.rutaBtn { background:#2196F3; color:white; }
.estadoBtn { background:#FF9800; color:white; }
.cancelarBtn { background:red; color:white; }

#dashboard {
  background:white;
  padding:10px;
  border-radius:10px;
  margin-bottom:10px;
  text-align:center;
  font-weight:bold;
}
</style>
</head>

<body>

<h1> Empresa Joe Rodriguez</h1>

<div id="dashboard"></div>
<div id="contenedor"></div>

<audio id="sonido">
  <source src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg">
</audio>

<script>

// 🔥 FIREBASE
const firebaseConfig = {
 apiKey: "AIzaSyC4FVokHFRbbTc4rBifNyt5bvOX2CuzkWw",
 authDomain: "calificaciones-9f753.firebaseapp.com",
 projectId: "calificaciones-9f753"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const contenedor = document.getElementById('contenedor');
const sonido = document.getElementById('sonido');

let ventasCache = [];
let idsMostrados = new Set();

// 🔔 NOTIFICACIONES
if ("Notification" in window) Notification.requestPermission();
function notificar(){ if(Notification.permission==="granted") new Notification("🚨 Nuevo pedido"); }

// 📳 VIBRAR
function vibrar(){ if(navigator.vibrate) navigator.vibrate([200,100,200]); }

// 🚚 MAPA
function navegar(dir){
 navigator.geolocation.getCurrentPosition(p=>{
  window.open(`https://www.google.com/maps/dir/${p.coords.latitude},${p.coords.longitude}/${encodeURIComponent(dir)}`);
 });
}

// 📊 DASHBOARD PRO
function dashboard(){
 let total=0, pendientes=0, camino=0, cancelados=0;

 ventasCache.forEach(v=>{
  const d=v.data;

  total += d.total||(d.precio*(d.cantidad_vendida||1))||0;

  if(d.estado==="En camino") camino++;
  else if(d.estado==="Pendiente") pendientes++;

  if(d.cancelado_motivo) cancelados++;
 });

 document.getElementById("dashboard").innerHTML =
 `💰 $${total} | ⏳ ${pendientes} | 🚚 ${camino} | ❌ ${cancelados}`;
}

// 🧠 RENDER
function render(){
 contenedor.innerHTML="";

 ventasCache.forEach(v=>{
  const d=v.data;

  if(d.entregado) return;

  const fecha=d.fecha_venta?.toDate?d.fecha_venta.toDate():new Date(d.fecha_venta);
  const dir=(d.direccion||"")+(d.numero?" #"+d.numero:"");
  const total=d.total||(d.precio*(d.cantidad_vendida||1));

  // 🎨 COLOR POR ESTADO
  let estadoColor="nuevo";
  if(d.estado==="En camino") estadoColor="medio";
  if(d.estado==="Entregado") estadoColor="viejo";

  const productos=d.productos
   ? d.productos.map(p=>`${p.producto} x${p.cantidad}`).join("<br>")
   : `${d.producto} x${d.cantidad_vendida||1}`;

  // ⚠️ ALERTA REPARTIDOR
  let cancelaciones = ventasCache.filter(x =>
    x.data.repartidor === d.repartidor && x.data.cancelado_motivo
  ).length;

  let alerta = cancelaciones >= 3
    ? `<p style="color:red;">⚠️ Repartidor con muchas cancelaciones</p>`
    : "";

  contenedor.innerHTML+=`
  <div class="card ${estadoColor}">
    <b>${d.familia||""}</b><br>
    📍 ${dir}<br>
    📞 ${d.telefono}<br>
    🕒 ${fecha.toLocaleTimeString()}<br>

    ${productos}<br>

    <b>$${total}</b>

    <p>📦 Estado: ${d.estado || 'Pendiente'}</p>

    ${d.cancelado_motivo ? `<p style="color:red;">❌ ${d.cancelado_motivo}</p>` : ''}

    ${alerta}

    <button class="rutaBtn" onclick="navegar('${dir}')">📍 Ir con GPS</button>

    <button class="estadoBtn" onclick="cambiarEstado('${v.id}')">
      🚚 Cambiar estado
    </button>

    ${d.estado === "En camino" ? `
      <button class="cancelarBtn" onclick="cancelarPedido('${v.id}')">
        ❌ Cancelar
      </button>
    ` : ''}

    <button class="entregarBtn" onclick="entregar('${v.id}')">
      ✅ Entregar
    </button>
  </div>`;
 });

 dashboard();
}

// 🔧 FUNCIONES

async function entregar(id){
 await db.collection('ventas').doc(id).update({ entregado:true });
}

async function cambiarEstado(id){
 const doc = await db.collection('ventas').doc(id).get();
 const data = doc.data();

 let actual = data.estado || "Pendiente";
 let nuevo = "Pendiente";

 if(actual === "Pendiente") nuevo = "En camino";
 else if(actual === "En camino") nuevo = "Entregado";

 await db.collection('ventas').doc(id).update({ estado:nuevo });
}

// ❌ CANCELACIÓN PRO
async function cancelarPedido(id){

 const opciones = [
  "Cliente no está",
  "Dirección incorrecta",
  "No contestan",
  "Pedido cancelado",
  "Otro"
 ];

 let opcion = prompt(
`Motivo:
1. Cliente no está
2. Dirección incorrecta
3. No contestan
4. Cancelado
5. Otro`
 );

 if(!opcion) return;

 let motivo = opciones[opcion-1] || "Otro";

 const doc = await db.collection('ventas').doc(id).get();
 const data = doc.data();

 await db.collection('ventas').doc(id).update({
  estado:"Pendiente",
  cancelado_motivo: motivo,
  cancelado_fecha: new Date(),
  cancelado_por: data.repartidor || "N/A"
 });

 alert("Cancelado y regresado a pendiente");
}

// 🔥 TIEMPO REAL
db.collection('ventas').orderBy('fecha_venta','desc')
.onSnapshot(snap=>{
 const ids=snap.docs.map(d=>d.id);

 ids.forEach(id=>{
  if(!idsMostrados.has(id)){
   sonido.play();
   vibrar();
   notificar();
  }
 });

 idsMostrados=new Set(ids);
 ventasCache=snap.docs.map(d=>({id:d.id,data:d.data()}));
 render();
});
</script>

</body>
</html>
